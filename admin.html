<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Secret</title>
</head>
<body>

<input type="password" id="pwd">
<button onclick="check()">Entrer</button>

<ul id="list"></ul>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = COLLE_TA_CONFIG_ICI;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.check = async function(){
if(document.getElementById("pwd").value==="1234"){
const snap=await getDocs(collection(db,"responses"));
snap.forEach(doc=>{
const li=document.createElement("li");
li.innerText=JSON.stringify(doc.data());
document.getElementById("list").appendChild(li);
});
}
}
</script>

</body>
</html>
