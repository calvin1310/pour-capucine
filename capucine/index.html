<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Une petite question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #f0f9ff);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    max-width: 500px;
}

h1 { font-size: 20px; }

#countdown { margin: 20px 0; color: #666; }

.buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

button {
    padding: 15px;
    border-radius: 25px;
    border: none;
    font-size: 16px;
}

#yesBtn { background: #7ecb89; color: white; }
#maybeBtn { background: #ffd1dc; }
#noBtn {
    background: #444;
    color: white;
    position: fixed;
}

.hidden { display: none; }

.heart {
    position: fixed;
    top: -20px;
    font-size: 18px;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Est-ce que tu veux dormir à la maison vendredi soir ? ❤️</h1>
    <div id="countdown"></div>

    <div class="buttons">
        <button id="yesBtn">Oui 💚</button>
        <button id="maybeBtn">Pas cette date 💗</button>
    </div>

    <div id="dateChoice" class="hidden">
        <input type="date" id="newDate">
        <button onclick="submitDate()">Valider</button>
    </div>
</div>

<button id="noBtn">Non 😈</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9xBR9PZrp4DJUokRcgUsB3rWzDbRehaQ",
  authDomain: "pour-capucine.firebaseapp.com",
  projectId: "pour-capucine",
  storageBucket: "pour-capucine.firebasestorage.app",
  messagingSenderId: "761681118829",
  appId: "1:761681118829:web:c628dbcb1a6a6a14c7a164"
};
;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Compte à rebours */
const friday = new Date("2026-02-27T20:00:00");

function updateCountdown(){
    const diff = friday - new Date();
    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff/(1000*60*60))%24);
    const m = Math.floor((diff/(1000*60))%60);
    document.getElementById("countdown").innerText =
    `Plus que ${d}j ${h}h ${m}min ❤️`;
}
setInterval(updateCountdown,1000);
updateCountdown();

/* Bouton NON qui fuit */
const noBtn = document.getElementById("noBtn");
function move(){
    noBtn.style.left = Math.random()*(window.innerWidth-100)+"px";
    noBtn.style.top = Math.random()*(window.innerHeight-50)+"px";
}
noBtn.addEventListener("mouseover",move);
noBtn.addEventListener("touchstart",move);

/* OUI */
document.getElementById("yesBtn").addEventListener("click", async ()=>{
    await addDoc(collection(db,"responses"),{
        type:"oui",
        timestamp:new Date()
    });
    document.body.innerHTML="<h1 style='text-align:center;margin-top:40vh;'>J'ai trop hâte ❤️</h1>";
});

/* AUTRE DATE */
document.getElementById("maybeBtn").addEventListener("click",()=>{
    document.getElementById("dateChoice").classList.remove("hidden");
});

window.submitDate = async function(){
    const date=document.getElementById("newDate").value;
    await addDoc(collection(db,"responses"),{
        type:"autre_date",
        proposedDate:date,
        timestamp:new Date()
    });
    document.body.innerHTML=`<h1 style='text-align:center;margin-top:40vh;'>D'accord pour le ${date} ❤️</h1>`;
}

/* Coeurs */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerText="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*4)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
}
setInterval(createHeart,500);

</script>
</body>
</html>
